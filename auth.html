<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PustakaFlow – Authentication</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/global.css" />
  <style>
    body {
      background-color: #F9FAFB; /* Off‑White */
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: white;
      padding: 2rem;
      border-radius: 1.5rem; /* rounded-2xl */
      box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1); /* shadow-xl */
      width: 100%;
      max-width: 400px;
    }
    .toggle {
      display: flex;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    .toggle button {
      background: none;
      border: none;
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-weight: 500;
      color: #475569; /* Slate Grey */
    }
    .toggle button.active {
      color: #111827; /* Deep Navy */
      border-bottom: 2px solid #111827;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.25rem;
      font-size: 0.875rem;
      color: #475569;
    }
    .form-group input {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid #cbd5e1; /* light gray */
      border-radius: 0.5rem;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #111827; /* Deep Navy */
    }
    .submit-btn {
      width: 100%;
      padding: 0.75rem;
      background-color: #111827; /* Deep Navy */
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .submit-btn:hover {
      background-color: #1e293b; /* slightly lighter navy */
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="toggle">
      <button id="loginTab" class="active">Login</button>
      <button id="registerTab">Create Account</button>
    </div>

    <!-- Login Form -->
    <form id="loginForm">
      <div class="form-group">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" name="email" required />
      </div>
      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" name="password" required />
      </div>
      <button type="submit" class="submit-btn">Login</button>
    </form>

    <!-- Register Form -->
    <form id="registerForm" class="hidden">
      <div class="form-group">
        <label for="registerName">Full Name</label>
        <input type="text" id="registerName" name="name" required />
      </div>
      <div class="form-group">
        <label for="registerEmail">Email</label>
        <input type="email" id="registerEmail" name="email" required />
      </div>
      <div class="form-group">
        <label for="registerPassword">Password</label>
        <input type="password" id="registerPassword" name="password" required />
      </div>
      <button type="submit" class="submit-btn">Create Account</button>
    </form>
  </div>

  <script>
    const loginTab = document.getElementById('loginTab');
    const registerTab = document.getElementById('registerTab');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');

    loginTab.addEventListener('click', () => {
      loginTab.classList.add('active');
      registerTab.classList.remove('active');
      loginForm.classList.remove('hidden');
      registerForm.classList.add('hidden');
    });
    registerTab.addEventListener('click', () => {
      registerTab.classList.add('active');
      loginTab.classList.remove('active');
      registerForm.classList.remove('hidden');
      loginForm.classList.add('hidden');
    });
  </script>
</body>
</html>
