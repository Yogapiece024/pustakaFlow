<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PustakaFlow - Sign In</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Lora', 'serif'],
                    },
                    colors: {
                        navy: {
                            900: '#111827',
                        },
                        silver: {
                            300: '#D1D5DB',
                            400: '#9CA3AF',
                        },
                        mainbg: '#F9FAFB',
                    }
                }
            }
        }
    </script>

    <!-- External CSS -->
    <link rel="stylesheet" href="css/global.css">

    <style>
        /* Subtle floating animation for the card */
        @keyframes floatIn {
            from {
                opacity: 0;
                transform: translateY(24px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .login-card {
            animation: floatIn 0.5s ease-out forwards;
        }
        /* Shake animation for error */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(6px); }
        }
        .shake {
            animation: shake 0.4s ease-in-out;
        }
        /* Gradient underline on focus */
        .input-focus-glow:focus {
            box-shadow: 0 2px 8px rgba(17, 24, 39, 0.12);
        }
    </style>
</head>

<body class="bg-mainbg font-sans min-h-screen flex items-center justify-center text-gray-800">

    <!-- Background decoration -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none" aria-hidden="true">
        <div class="absolute -top-40 -right-40 w-96 h-96 bg-gradient-to-br from-gray-200/40 to-transparent rounded-full blur-3xl"></div>
        <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-gradient-to-tr from-gray-200/40 to-transparent rounded-full blur-3xl"></div>
    </div>

    <!-- Login Card -->
    <div class="login-card bg-white p-8 md:p-10 rounded-2xl shadow-xl w-full max-w-md border border-gray-100 relative z-10">

        <!-- Logo / Brand -->
        <div class="text-center mb-8">
            <img src="image/logo.png" alt="PustakaFlow Logo" class="h-12 w-auto mx-auto mb-4">
            <h1 class="text-xl font-serif font-bold text-navy-900 mb-1">Welcome Back</h1>
            <p class="text-sm text-gray-500">Sign in to access your library</p>
        </div>

        <!-- Error Message (hidden by default) -->
        <div id="loginError"
            class="hidden mb-4 p-3 rounded-lg bg-red-50 border border-red-200 text-red-600 text-sm text-center transition-all">
            <span id="loginErrorText">Invalid username or password.</span>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="space-y-5" autocomplete="off">

            <!-- Username -->
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1.5">Username</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </span>
                    <input type="text" id="username" name="username" required placeholder="Enter your username"
                        class="input-focus-glow w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-navy-900 focus:border-navy-900 transition-all duration-200">
                </div>
            </div>

            <!-- Password -->
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                            </path>
                        </svg>
                    </span>
                    <input type="password" id="password" name="password" required placeholder="••••••••"
                        class="input-focus-glow w-full pl-10 pr-11 py-2.5 bg-gray-50 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-navy-900 focus:border-navy-900 transition-all duration-200">
                    <!-- Show/Hide Password Toggle -->
                    <button type="button" id="togglePassword"
                        class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-gray-400 hover:text-gray-600 transition-colors">
                        <svg id="eyeIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                            </path>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Submit Button -->
            <div class="pt-1">
                <button type="submit" id="loginBtn"
                    class="w-full flex justify-center items-center gap-2 py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-white bg-navy-900 hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-navy-900 transition-all duration-200 active:scale-[0.98]">
                    <span id="loginBtnText">Sign In</span>
                    <!-- Loading spinner (hidden by default) -->
                    <svg id="loginSpinner" class="hidden animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg"
                        fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor"
                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                        </path>
                    </svg>
                </button>
            </div>
        </form>

        <!-- Footer hint -->
        <div class="text-center mt-6">
            <p class="text-xs text-gray-400">PustakaFlow &copy; 2025 &mdash; Library Management System</p>
        </div>
    </div>

    <!-- External Login Script -->
    <script src="js/login.js"></script>

</body>

</html>
